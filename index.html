<!DOCTYPE html>
<html>

<head>

<title>Monitoring of Passes for CY 2026</title>

<style>

body{
font-family:Arial;
margin:20px;
}

table{
border-collapse:collapse;
width:100%;
}

th,td{
border:1px solid black;
padding:8px;
text-align:center;
}

th{
background-color:#e6e6e6;
}

.onleave{
background-color:#ff9999;
}

.available{
background-color:#99ff99;
}

.notavailable{
background-color:#ffff99;
}

</style>

</head>

<body>

<h2>Monitoring of Passes for CY 2026</h2>

<h3>Personnel Pass Status Dashboard</h3>

<div id="dashboard"></div>

<br>

<input type="text" id="search" placeholder="Search Personnel" onkeyup="searchName()">

<br><br>

<table id="passTable">

<tr>
<th>Date</th>
<th>Name of Personnel</th>
<th>Duration (Days)</th>
<th>Remarks</th>
<th>Action</th>
</tr>

</table>

<br>

<input type="date" id="date">

<select id="name">

<option>Juan Dela Cruz</option>
<option>Maria Santos</option>
<option>Pedro Reyes</option>
<option>Carlos Mendoza</option>
<option>Antonio Garcia</option>
<option>Ramon Villanueva</option>
<option>Jose Ramirez</option>
<option>Daniel Cruz</option>
<option>Mark Bautista</option>

</select>

<input type="number" id="duration" placeholder="Duration (Max 6 days)">

<button onclick="addRow()">Add Record</button>

<button onclick="exportExcel()">Export Excel</button>

<button onclick="monthlyReport()">Monthly Report</button>

<script>

/* ===============================
Add Record
=============================== */

function addRow(){

let table=document.getElementById("passTable");

let date=document.getElementById("date").value;
let name=document.getElementById("name").value;
let duration=parseInt(document.getElementById("duration").value);

if(duration>6){
alert("Maximum allowed duration is 6 days.");
return;
}

let startDate=new Date(date);
let today=new Date();

let endDate=new Date(startDate);
endDate.setDate(endDate.getDate()+duration);

/* Pass eligibility rule */
let remark="";
let rowClass="";

let availDate=new Date(endDate);
availDate.setMonth(availDate.getMonth()+2); // 2 months waiting rule

if(today>=startDate && today<=endDate){

remark="On Leave";
rowClass="onleave";

}
else if(today<availDate){

remark="Not yet Available to Avail";
rowClass="notavailable";

}
else{

remark="Can Avail for Passes";
rowClass="available";

}

let row=table.insertRow();

row.insertCell(0).innerHTML=date;
row.insertCell(1).innerHTML=name;
row.insertCell(2).innerHTML=duration;
row.insertCell(3).innerHTML=remark;

/* Delete Button */
let deleteCell=row.insertCell(4);

let btn=document.createElement("button");
btn.innerHTML="Delete";

btn.onclick=function(){
row.remove();
saveData();
updateDashboard();
};

deleteCell.appendChild(btn);

row.className=rowClass;

saveData();
updateDashboard();

}

/* ===============================
Search Name
=============================== */

function searchName(){

let input=document.getElementById("search").value.toLowerCase();
let table=document.getElementById("passTable");
let rows=table.getElementsByTagName("tr");

for(let i=1;i<rows.length;i++){

let name=rows[i].cells[1].innerHTML.toLowerCase();

if(name.includes(input)){
rows[i].style.display="";
}
else{
rows[i].style.display="none";
}

}

}

/* ===============================
Export Excel
=============================== */

function exportExcel(){

let table=document.getElementById("passTable").outerHTML;

let url='data:application/vnd.ms-excel,'+encodeURIComponent(table);

let link=document.createElement("a");

link.href=url;
link.download="Monitoring_of_Passes_2026.xls";

link.click();

}

/* ===============================
Monthly Report
=============================== */

function monthlyReport(){

let table=document.getElementById("passTable");
let rows=table.getElementsByTagName("tr");

let report={};

for(let i=1;i<rows.length;i++){

let date=new Date(rows[i].cells[0].innerHTML);
let month=date.toLocaleString('default',{month:'long'});

if(!report[month]){
report[month]=0;
}

report[month]++;

}

let result="Monthly Pass Report\n\n";

for(let m in report){
result+=m+" : "+report[m]+" passes\n";
}

alert(result);

}

/* ===============================
Dashboard
=============================== */

function updateDashboard(){

let table=document.getElementById("passTable");
let rows=table.getElementsByTagName("tr");

let available=[];
let onleave=[];
let waiting=[];

for(let i=1;i<rows.length;i++){

let name=rows[i].cells[1].innerHTML;
let remark=rows[i].cells[3].innerHTML;

if(remark=="Can Avail for Passes"){
available.push(name);
}

if(remark=="On Leave"){
onleave.push(name);
}

if(remark=="Not yet Available to Avail"){
waiting.push(name);
}

}

document.getElementById("dashboard").innerHTML=

"<b>Available for Pass:</b> "+available.join(", ")+"<br><br>"+
"<b>Currently On Leave:</b> "+onleave.join(", ")+"<br><br>"+
"<b>Not Yet Eligible:</b> "+waiting.join(", ");

}

/* ===============================
Local Storage Save
=============================== */

function saveData(){
localStorage.setItem("passTableData",document.getElementById("passTable").innerHTML);
}

window.onload=function(){
let data=localStorage.getItem("passTableData");
if(data){
document.getElementById("passTable").innerHTML=data;
}
updateDashboard();
}

</script>

</body>

</html>
